version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: opc
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/opc
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      LLM_API_KEY: ${MINIMAX_API_KEY:-}
      LLM_BASE_URL: ${MINIMAX_BASE_URL:-https://api.minimaxi.com/anthropic}
      LLM_MODEL: ${MINIMAX_MODEL:-MiniMax-M3}
      LLM_PROVIDER: ${LLM_PROVIDER:-minimax}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./generated-projects:/app/generated-projects

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.worker.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/opc
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      LLM_API_KEY: ${MINIMAX_API_KEY:-}
      LLM_BASE_URL: ${MINIMAX_BASE_URL:-https://api.minimaxi.com/anthropic}
      LLM_MODEL: ${MINIMAX_MODEL:-MiniMax-M3}
      LLM_PROVIDER: ${LLM_PROVIDER:-minimax}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-in-production}
      GENERATED_PROJECTS_DIR: /app/generated-projects
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./generated-projects:/app/generated-projects

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data: